<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStock - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* ── Autumn gradient background ── */
        body {
            min-height: 100vh;
            background: linear-gradient(
                180deg,
                #e8a045 0%,
                #f0b347 20%,
                #e89030 50%,
                #d4732a 75%,
                #c45e20 100%
            );
            overflow: hidden;
        }

        /* ── Sun glow ── */
        body::before {
            content: '';
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            height: 340px;
            background: radial-gradient(circle, rgba(255,220,100,0.55) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Ground strip ── */
        body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(180deg, #b85a1a 0%, #9a4510 100%);
            z-index: 0;
        }

        /* ── Trees (CSS drawn) ── */
        .tree {
            position: absolute;
            bottom: 60px;
            z-index: 2;
            pointer-events: none;
        }
        .tree .trunk {
            width: 22px;
            background: #6b3a1f;
            border-radius: 4px;
            margin: 0 auto;
        }
        .tree .canopy {
            border-radius: 50% 50% 40% 40%;
            margin: 0 auto;
        }
        /* Left big tree */
        .tree-left {
            left: -10px;
        }
        .tree-left .trunk  { height: 120px; width: 28px; }
        .tree-left .canopy {
            width: 180px; height: 220px;
            background: radial-gradient(ellipse at 40% 30%, #e05c20, #b83a10 60%, #8a2a08);
            margin-bottom: -6px;
        }
        /* Right tree */
        .tree-right {
            right: 30px;
        }
        .tree-right .trunk  { height: 100px; width: 22px; }
        .tree-right .canopy {
            width: 150px; height: 190px;
            background: radial-gradient(ellipse at 60% 30%, #d4601a, #a83010 60%, #7a2008);
            margin-bottom: -4px;
        }
        /* Far-left small tree */
        .tree-far-left {
            left: 130px;
        }
        .tree-far-left .trunk  { height: 80px; width: 16px; }
        .tree-far-left .canopy {
            width: 110px; height: 140px;
            background: radial-gradient(ellipse at 45% 35%, #e87030, #c04a18);
            margin-bottom: -3px;
        }

        /* ── Flowers / ground detail ── */
        .ground-detail {
            position: absolute;
            bottom: 55px;
            left: 0;
            width: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .flower {
            position: absolute;
            bottom: 0;
        }
        .flower::before {
            content: '❀';
            font-size: 22px;
            color: #e05520;
        }

        /* ── Animated falling leaves ── */
        .leaves {
            position: absolute;
            width: 100%;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        .leaf {
            position: absolute;
            top: -60px;
            opacity: 0;
            animation: fall linear infinite;
        }

        .leaf svg {
            fill: currentColor;
            filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.15));
        }

        /* Individual leaf positions, sizes, colors, speeds */
        .leaf:nth-child(1)  { left:  8%; color:#c0390e; animation-duration:14s; animation-delay:0s;    width:28px; }
        .leaf:nth-child(2)  { left: 20%; color:#d45a1a; animation-duration:11s; animation-delay:2s;    width:22px; }
        .leaf:nth-child(3)  { left: 35%; color:#b03010; animation-duration:16s; animation-delay:4s;    width:32px; }
        .leaf:nth-child(4)  { left: 50%; color:#e06820; animation-duration:10s; animation-delay:1s;    width:18px; }
        .leaf:nth-child(5)  { left: 62%; color:#c84010; animation-duration:13s; animation-delay:5s;    width:26px; }
        .leaf:nth-child(6)  { left: 75%; color:#d05018; animation-duration:12s; animation-delay:3s;    width:20px; }
        .leaf:nth-child(7)  { left: 88%; color:#a82a08; animation-duration:15s; animation-delay:6s;    width:30px; }
        .leaf:nth-child(8)  { left: 14%; color:#e07828; animation-duration: 9s; animation-delay:7s;    width:16px; }
        .leaf:nth-child(9)  { left: 44%; color:#c03818; animation-duration:17s; animation-delay:0.5s;  width:24px; }
        .leaf:nth-child(10) { left: 92%; color:#d46020; animation-duration:11s; animation-delay:8s;    width:22px; }
        .leaf:nth-child(11) { left: 30%; color:#b84010; animation-duration:14s; animation-delay:3.5s;  width:18px; }
        .leaf:nth-child(12) { left: 58%; color:#e05010; animation-duration:12s; animation-delay:9s;    width:28px; }

        @keyframes fall {
            0%   { opacity:0; top:-60px;  transform: translateX(0px)    rotate(0deg);   }
            10%  { opacity:1; }
            25%  { transform: translateX(-30px)  rotate(45deg);  }
            50%  { transform: translateX(25px)   rotate(120deg); }
            75%  { transform: translateX(-20px)  rotate(200deg); }
            90%  { opacity:1; }
            100% { opacity:0; top:110vh;  transform: translateX(15px)    rotate(280deg); }
        }

        /* ── Page centre layout ── */
        .page-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ── Glass card ── */
        .login-card {
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-bottom-color: rgba(255,255,255,0.4);
            border-right-color:  rgba(255,255,255,0.4);
            border-radius: 24px;
            padding: 56px 52px 48px;
            width: 460px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .login-card h2 {
            text-align: center;
            font-size: 2.2em;
            font-weight: 600;
            color: #8f2c24;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        /* ── Inputs ── */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            color: #8f2c24;
            background: #fff;
            border: none;
            border-radius: 8px;
            outline: none;
            transition: box-shadow 0.3s;
        }

        .input-group input::placeholder {
            color: #c07060;
            font-weight: 400;
        }

        .input-group input:focus {
            box-shadow: 0 0 0 3px rgba(143,44,36,0.2);
        }

        /* ── Login button ── */
        .btn-login {
            width: 100%;
            padding: 15px;
            margin-top: 12px;
            background: #8f2c24;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: background 0.3s, transform 0.15s;
            letter-spacing: 0.5px;
        }

        .btn-login:hover  { background: #c04030; }
        .btn-login:active { transform: scale(0.98); }

        /* ── Error message ── */
        #error-msg {
            display: none;
            margin-top: 16px;
            padding: 10px 14px;
            background: rgba(200,40,20,0.15);
            border: 1px solid rgba(200,40,20,0.3);
            border-radius: 8px;
            color: #8f2c24;
            font-size: 0.9em;
            text-align: center;
        }

        /* ── SmartStock branding under card ── */
        .brand-label {
            text-align: center;
            margin-top: 18px;
            color: rgba(255,255,255,0.75);
            font-size: 0.85em;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- CSS Trees -->
    <div class="tree tree-left">
        <div class="canopy"></div>
        <div class="trunk"></div>
    </div>
    <div class="tree tree-far-left">
        <div class="canopy"></div>
        <div class="trunk"></div>
    </div>
    <div class="tree tree-right">
        <div class="canopy"></div>
        <div class="trunk"></div>
    </div>

    <!-- Falling Leaves -->
    <div class="leaves">
        <div class="leaf"><svg viewBox="0 0 40 40"><path d="M20 2 C10 8 2 18 5 30 C10 24 18 16 20 2Z M20 2 C30 8 38 18 35 30 C30 24 22 16 20 2Z"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><ellipse cx="20" cy="20" rx="10" ry="18" transform="rotate(-20 20 20)"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><path d="M20 2 C10 8 2 18 5 30 C10 24 18 16 20 2Z M20 2 C30 8 38 18 35 30 C30 24 22 16 20 2Z"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><ellipse cx="20" cy="20" rx="9" ry="17" transform="rotate(15 20 20)"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><path d="M20 2 C10 8 2 18 5 30 C10 24 18 16 20 2Z M20 2 C30 8 38 18 35 30 C30 24 22 16 20 2Z"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><ellipse cx="20" cy="20" rx="10" ry="16" transform="rotate(-30 20 20)"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><path d="M20 2 C10 8 2 18 5 30 C10 24 18 16 20 2Z M20 2 C30 8 38 18 35 30 C30 24 22 16 20 2Z"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><ellipse cx="20" cy="20" rx="8" ry="15" transform="rotate(10 20 20)"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><path d="M20 2 C10 8 2 18 5 30 C10 24 18 16 20 2Z M20 2 C30 8 38 18 35 30 C30 24 22 16 20 2Z"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><ellipse cx="20" cy="20" rx="10" ry="18" transform="rotate(-10 20 20)"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><path d="M20 2 C10 8 2 18 5 30 C10 24 18 16 20 2Z M20 2 C30 8 38 18 35 30 C30 24 22 16 20 2Z"/></svg></div>
        <div class="leaf"><svg viewBox="0 0 40 40"><ellipse cx="20" cy="20" rx="9" ry="16" transform="rotate(25 20 20)"/></svg></div>
    </div>

    <!-- Login Card -->
    <div class="page-wrapper">
        <div>
            <div class="login-card">
                <h2>Sign In</h2>

                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password">
                </div>

                <button class="btn-login" onclick="handleLogin()">Login</button>

                <div id="error-msg">
                    ❌ Invalid username or password.
                </div>
            </div>
            <p class="brand-label">📦 SmartStock POS System</p>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            if (!username || !password) {
                errorMsg.innerText = '⚠️ Please enter both username and password.';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('currentUser', data.username);
                    localStorage.setItem('currentRole', data.role);
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.innerText = '❌ Access Denied: Invalid credentials.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = '⚠️ Server error. Is the server running?';
                errorMsg.style.display = 'block';
            }
        }

        // Allow pressing Enter to login
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
